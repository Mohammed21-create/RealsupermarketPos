<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales - SmartPOS</title>

<link rel="stylesheet" href="admin10.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
    /* ═══════════════════════════════════════════
   SMARTPOS — CASHIER ACTIVITIES  |  cashier.css
   ═══════════════════════════════════════════ */

@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap');

/* ── CSS VARIABLES ── */
:root {
  --bg:        linear-gradient(135deg,#667eea,#764ba2);;
  --surface:   #1848ce;
  --surface2:  #1c2030;
  --surface3:  #242840;
  --border:    #2a2e45;
  --accent:    #f5c842;
  --accent2:   #ff6b35;
  --green:     #3ddc84;
  --red:       #ff4d6d;
  --blue:      white;
  --text:      white;
  --text2:     white;
  --text3:     white;
  --radius:    12px;
  --radius-sm: 8px;
}

/* ════════════════════════════════════════════
   RESET & BASE
   ════════════════════════════════════════════ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

input, select, button, textarea { font-family: 'DM Sans', sans-serif; }
a { text-decoration: none; color: inherit; }

/* ════════════════════════════════════════════
   ADMIN CONTAINER  (.admin-container)
   Two-column: sidebar | main
   ════════════════════════════════════════════ */
.admin-container {
  display: grid;
  grid-template-columns: 220px 1fr;
  min-height: 100vh;
}

/* ════════════════════════════════════════════
   SIDEBAR  (.sidebar)
   ════════════════════════════════════════════ */
.sidebar {
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
}

.sidebar::-webkit-scrollbar { width: 3px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

/* Brand */
.sidebar h2 {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 16px;
  color: var(--accent);
  padding: 20px 18px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
}

.sidebar h2 i { font-size: 15px; }

/* Nav list */
.sidebar ul {
  list-style: none;
  padding: 10px 8px;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.sidebar ul li a {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 12px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 500;
  color: var(--text2);
  transition: all 0.15s;
}

.sidebar ul li a i {
  font-size: 13px;
  width: 16px;
  text-align: center;
  color: var(--text3);
}

.sidebar ul li a:hover        { background: var(--surface2); color: var(--text); }
.sidebar ul li.active a       { background: var(--accent); color: #0d0f14; font-weight: 700; }
.sidebar ul li.active a i     { color: #0d0f14; }

/* ════════════════════════════════════════════
   MAIN COLUMN  (.main)
   ════════════════════════════════════════════ */
.main {
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  background: var(--bg);
  min-height: 100vh;
}

.main::-webkit-scrollbar { width: 4px; }
.main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

/* ════════════════════════════════════════════
   DASHBOARD HEADER  (.dashboard-header)
   ════════════════════════════════════════════ */
.dashboard-header {
  display: flex;
  align-items: center;
  padding: 0 24px;
  height: 56px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  position: sticky;
  top: 0;
  z-index: 50;
}

.dashboard-header h2 {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 17px;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 10px;
}

/* ════════════════════════════════════════════
   REFUND / CASHIER HISTORY WRAPPER
   (.refund-history)
   ════════════════════════════════════════════ */
.refund-history {
  flex: 1;
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

/* ════════════════════════════════════════════
   CASHIER HISTORY PANEL  (.cashier-history)
   ════════════════════════════════════════════ */
.cashier-history {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* Panel heading */
.cashier-history h3 {
  font-family: 'Syne', sans-serif;
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
}

/* ── Search row ── */
.cashier-history .search-box {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--surface2);
}

.cashier-history .search-box input,
#searchCashier {
  flex: 1;
  background: var(--surface3);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 9px 14px;
  color: var(--text);
  font-size: 13px;
  outline: none;
  transition: border-color 0.15s;
  max-width: 360px;
}

.cashier-history .search-box input::placeholder,
#searchCashier::placeholder { color: var(--text3); }

.cashier-history .search-box input:focus,
#searchCashier:focus { border-color: var(--accent); }

/* Search button — rendered just after .search-box div */
#searchCashierBtn {
  margin: 0 20px 14px;
  align-self: flex-start;
  background: var(--accent);
  color: #0d0f14;
  border: none;
  padding: 8px 20px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 700;
  font-family: 'Syne', sans-serif;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 7px;
  transition: opacity 0.15s;
}

#searchCashierBtn:hover { opacity: 0.85; }

/* ════════════════════════════════════════════
   CASHIER ACTIVITY TABLE  (.product-table)
   ════════════════════════════════════════════ */
.product-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}

.product-table thead tr { background: var(--surface2); }

.product-table thead th {
  text-align: left;
  padding: 11px 16px;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text3);
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}

.product-table tbody tr {
  border-bottom: 1px solid rgba(42, 46, 69, 0.55);
  transition: background 0.1s;
  cursor: pointer;
}

.product-table tbody tr:last-child { border-bottom: none; }
.product-table tbody tr:hover { background: var(--surface2); }

.product-table tbody td {
  padding: 12px 16px;
  vertical-align: middle;
  color: var(--text);
}

/* Date column */
.product-table tbody td:nth-child(1) {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  color: var(--text3);
}

/* Time column */
.product-table tbody td:nth-child(2) {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  color: var(--text3);
}

/* Cashier name */
.product-table tbody td:nth-child(3) {
  font-weight: 500;
  color: white;
}
.product-table th{
    color: white;
}

/* Items Sold */
.product-table tbody td:nth-child(4) {
  font-family: 'DM Mono', monospace;
  color: var(--blue);
}

/* Total */
.product-table tbody td:nth-child(5) {
  font-family: 'DM Mono', monospace;
  color: var(--green);
  font-weight: 500;
}

/* Payment method */
.product-table tbody td:nth-child(6) {
  font-size: 12px;
  color: var(--text2);
}

/* Empty state row */
.product-table tbody tr.empty-row td {
  text-align: center;
  padding: 40px;
  color: var(--text3);
  font-size: 13px;
  cursor: default;
}

/* ════════════════════════════════════════════
   CASHIER POPUP  (#cashierPopup)
   Overrides the inline styles for the popup
   ════════════════════════════════════════════ */
#cashierPopup {
  /* layout kept via inline style — we style the inner box */
  backdrop-filter: blur(4px) !important;
  background: rgba(0, 0, 0, 0.72) !important;
  z-index: 300;
  display: flex !important;
  align-items: center;
  justify-content: center;
}

/* Hide when JS sets display:none */
#cashierPopup[style*="display:none"],
#cashierPopup[style*="display: none"] {
  display: none !important;
}

/* Inner popup box — override inline white/black */
#cashierPopup > div {
  background: var(--surface) !important;
  color: var(--text) !important;
  border: 1px solid var(--border) !important;
  border-radius: 16px !important;
  padding: 28px !important;
  width: 440px !important;
  max-width: 94vw !important;
  margin: 0 auto !important;
  box-shadow: 0 24px 80px rgba(0,0,0,0.5) !important;
  animation: modalIn 0.2s ease;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

@keyframes modalIn {
  from { opacity: 0; transform: scale(0.95) translateY(10px); }
  to   { opacity: 1; transform: scale(1)    translateY(0); }
}

/* Popup body content */
#cashierPopupBody {
  font-size: 13px;
  color: var(--text2);
  line-height: 1.8;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

#cashierPopupBody p,
#cashierPopupBody div {
  display: flex;
  justify-content: space-between;
  padding: 5px 0;
  border-bottom: 1px solid rgba(42,46,69,0.45);
  font-family: 'DM Mono', monospace;
  font-size: 13px;
}

#cashierPopupBody strong,
#cashierPopupBody b {
  color: var(--accent);
  font-weight: 600;
}

/* Close button inside popup */
#cashierPopup > div > button {
  align-self: flex-end;
  background: none;
  border: 1px solid var(--border);
  color: var(--text2);
  padding: 8px 18px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  cursor: pointer;
  transition: all 0.15s;
  margin-top: 6px;
}

#cashierPopup > div > button:hover {
  border-color: var(--red);
  color: var(--red);
}

/* ════════════════════════════════════════════
   FOOTER
   ════════════════════════════════════════════ */
footer {
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding: 12px 24px;
  font-size: 11px;
  color: var(--text3);
  text-align: center;
  margin-top: auto;
}

/* ════════════════════════════════════════════
   SCROLLBAR (global)
   ════════════════════════════════════════════ */
::-webkit-scrollbar       { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

/* ════════════════════════════════════════════
   RESPONSIVE
   ════════════════════════════════════════════ */
@media (max-width: 860px) {
  .admin-container {
    grid-template-columns: 1fr;
  }

  .sidebar {
    display: none;
  }

  .refund-history {
    padding: 14px;
  }

  .cashier-history .search-box {
    flex-direction: column;
    align-items: stretch;
  }

  .cashier-history .search-box input,
  #searchCashier {
    max-width: 100%;
  }

  #searchCashierBtn {
    margin: 0 14px 14px;
    width: calc(100% - 28px);
    justify-content: center;
  }
}

@media (max-width: 520px) {
  .dashboard-header { padding: 0 14px; }
  .product-table thead th,
  .product-table tbody td { padding: 10px 10px; }
}

/* ════════════════════════════════════════════
   PRINT
   ════════════════════════════════════════════ */
@media print {
  .sidebar,
  .dashboard-header,
  .cashier-history .search-box,
  #searchCashierBtn,
  footer { display: none !important; }

  .admin-container { grid-template-columns: 1fr; }
  body { background: #fff; color: #000; }
  .product-table tbody td { color: #000; }
}
</style>
</head>
