<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Management</title>

<link rel="stylesheet" href="admin1.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
<style>
    /* ═══════════════════════════════════════════
   SMARTPOS — PRODUCT MANAGEMENT  |  admin.css
   ═══════════════════════════════════════════ */

/* ── GOOGLE FONTS ── */
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap');

/* ── CSS VARIABLES (same as style.css) ── */
:root {
  --bg:        linear-gradient(135deg,#667eea,#764ba2);;
  --surface:   #2f55be;
  --surface2:  #1c2030;
  --surface3:  #2f45c2;
  --border:    #2a2e45;
  --accent:    #f5c842;
  --accent2:   #ff6b35;
  --green:     #3ddc84;
  --red:       #ff4d6d;
  --blue:      #4d9fff;
  --text:      #e8eaf2;
  --text2:     white;
  --text3:     white;
  --radius:    12px;
  --radius-sm: 8px;
}

/* ════════════════════════════════════════════
   RESET & BASE
   ════════════════════════════════════════════ */
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

input, select, button, textarea {
  font-family: 'DM Sans', sans-serif;
}

/* ════════════════════════════════════════════
   ADMIN CONTAINER  (.admin-container)
   Two-column layout: sidebar + main
   ════════════════════════════════════════════ */
.admin-container {
  display: grid;
  grid-template-columns: 220px 1fr;
  min-height: 100vh;
}

/* ════════════════════════════════════════════
   SIDEBAR  (.sidebar)
   ════════════════════════════════════════════ */
.sidebar {
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: 0;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
}

/* Sidebar logo / brand */
.sidebar h2 {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 18px;
  color: var(--accent);
  padding: 20px 22px;
  border-bottom: 1px solid var(--border);
  letter-spacing: -0.3px;
}

/* Nav list */
.sidebar ul {
  list-style: none;
  padding: 12px 10px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.sidebar ul li a {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 500;
  color: var(--text2);
  text-decoration: none;
  transition: all 0.15s;
}

.sidebar ul li a:hover {
  background: var(--surface2);
  color: var(--text);
}

/* Active link */
.sidebar ul li.active a {
  background: var(--accent);
  color: #0d0f14;
  font-weight: 700;
}

.sidebar ul li.active a i {
  color: #0d0f14;
}

/* ════════════════════════════════════════════
   MAIN CONTENT  (.main)
   ════════════════════════════════════════════ */
.main {
  display: flex;
  flex-direction: column;
  gap: 20px;
  padding: 28px 32px;
  overflow-y: auto;
  background: var(--bg);
}

.main::-webkit-scrollbar       { width: 4px; }
.main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

/* ════════════════════════════════════════════
   PAGE TITLE  (.page-title)
   ════════════════════════════════════════════ */
.page-title {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 20px;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 10px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}

.page-title i {
  color: var(--accent);
  font-size: 18px;
}

/* ════════════════════════════════════════════
   PRODUCT FORM  (.product-form)
   ════════════════════════════════════════════ */
.product-form {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 22px 24px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 14px;
  align-items: end;
}

/* Input groups inside the form */
.input-group {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 0 12px;
  transition: border-color 0.15s;
}

.input-group:focus-within {
  border-color: var(--accent);
}

.input-group i {
  color: var(--text3);
  font-size: 13px;
  flex-shrink: 0;
  width: 16px;
  text-align: center;
}

/* Nested input-group (bulk cost inside cost price group) */
.input-group .input-group {
  border: none;
  background: transparent;
  padding: 0;
  border-radius: 0;
  flex: 1;
}

.input-group .input-group:focus-within {
  border-color: transparent;
}

.input-group input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  padding: 10px 0;
  color: var(--text);
  font-size: 13px;
  width: 100%;
}

.input-group input::placeholder {
  color: var(--text3);
  font-size: 13px;
}

/* Add button */
.add-btn {
  grid-column: 1 / -1;
  background: var(--accent);
  color: #0d0f14;
  border: none;
  padding: 12px 24px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 700;
  font-family: 'Syne', sans-serif;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: opacity 0.15s;
  letter-spacing: 0.2px;
}

.add-btn:hover { opacity: 0.85; }

.add-btn i { font-size: 14px; }

/* ════════════════════════════════════════════
   SEARCH BOX  (.search-box)
   ════════════════════════════════════════════ */
.search-box {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 0 14px;
  max-width: 400px;
  transition: border-color 0.15s;
}

.search-box:focus-within {
  border-color: var(--accent);
}

.search-box i {
  color: var(--text3);
  font-size: 13px;
  flex-shrink: 0;
}

#searchProduct {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  padding: 10px 0;
  color: var(--text);
  font-size: 13px;
}

#searchProduct::placeholder { color: var(--text3); }

/* ════════════════════════════════════════════
   PRODUCT TABLE  (.product-table)
   ════════════════════════════════════════════ */
.product-table {
  width: 100%;
  border-collapse: collapse;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  font-size: 13px;
}

/* Table head */
.product-table thead tr {
  background: var(--surface2);
}

.product-table thead th {
  text-align: left;
  padding: 12px 14px;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text3);
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}

/* Table body rows */
.product-table tbody tr {
  border-bottom: 1px solid rgba(42, 46, 69, 0.6);
  transition: background 0.1s;
}

.product-table tbody tr:last-child {
  border-bottom: none;
}

.product-table tbody tr:hover {
  background: var(--surface2);
}

/* Table cells */
.product-table tbody td {
  padding: 12px 14px;
  vertical-align: middle;
  color: var(--text);
}

/* Numeric columns */
.product-table tbody td:nth-child(2),
.product-table tbody td:nth-child(3),
.product-table tbody td:nth-child(4),
.product-table tbody td:nth-child(5),
.product-table tbody td:nth-child(6),
.product-table tbody td:nth-child(7),
.product-table tbody td:nth-child(8) {
  font-family: 'DM Mono', monospace;
  color: var(--text2);
}

/* Unit profit column — highlight green */
.product-table tbody td:nth-child(8) {
  color: var(--green);
}

/* Stock column — color-code low/out */
.product-table tbody td.low-stock  { color: var(--accent2) !important; }
.product-table tbody td.out-stock  { color: var(--red) !important; }

/* Barcode column */
.product-table tbody td:nth-child(9) {
  text-align: center;
}

.product-table tbody td svg,
.product-table tbody td canvas {
  display: block;
  margin: auto;
  max-width: 100px;
}

/* ── Action Buttons inside table ── */
.product-table .action-btns {
  display: flex;
  gap: 6px;
  align-items: center;
}

.product-table .btn-edit,
.product-table .btn-delete {
  width: 30px;
  height: 30px;
  border-radius: 7px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text2);
  cursor: pointer;
  font-size: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.12s;
}

.product-table .btn-edit:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(245, 200, 66, 0.08);
}

.product-table .btn-delete:hover {
  border-color: var(--red);
  color: var(--red);
  background: rgba(255, 77, 109, 0.08);
}

/* Generic edit / delete classes (if JS uses these directly) */
.btn-edit {
  width: 30px;
  height: 30px;
  border-radius: 7px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text2);
  cursor: pointer;
  font-size: 12px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  transition: all 0.12s;
}

.btn-delete {
  width: 30px;
  height: 30px;
  border-radius: 7px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text2);
  cursor: pointer;
  font-size: 12px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  transition: all 0.12s;
}

.btn-edit:hover   { border-color: var(--accent); color: var(--accent); background: rgba(245,200,66,0.08); }
.btn-delete:hover { border-color: var(--red);    color: var(--red);    background: rgba(255,77,109,0.08); }

/* ════════════════════════════════════════════
   EMPTY TABLE STATE
   ════════════════════════════════════════════ */
.product-table tbody tr.empty-row td {
  text-align: center;
  padding: 40px;
  color: var(--text3);
  font-size: 13px;
}

/* ════════════════════════════════════════════
   TOAST NOTIFICATIONS  (reused from style.css)
   ════════════════════════════════════════════ */
.toast {
  position: fixed;
  bottom: 22px;
  right: 22px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 11px 17px;
  font-size: 13px;
  z-index: 300;
  display: flex;
  align-items: center;
  gap: 8px;
  transform: translateY(70px);
  opacity: 0;
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  pointer-events: none;
}

.toast.show    { transform: translateY(0); opacity: 1; }
.toast.success { border-color: var(--green); }
.toast.error   { border-color: var(--red); }
.toast.warning { border-color: var(--accent); }

/* ════════════════════════════════════════════
   MODAL (edit product modal if used)
   ════════════════════════════════════════════ */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.72);
  z-index: 200;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(4px);
}

.modal-overlay.open { display: flex; }

.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 28px;
  width: 480px;
  max-width: 94vw;
  animation: modalIn 0.2s ease;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

@keyframes modalIn {
  from { opacity: 0; transform: scale(0.95) translateY(10px); }
  to   { opacity: 1; transform: scale(1)    translateY(0); }
}

.modal-title {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 17px;
  color: var(--text);
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}

.modal .input-group {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 0 12px;
  display: flex;
  align-items: center;
  gap: 10px;
  transition: border-color 0.15s;
}

.modal .input-group:focus-within { border-color: var(--accent); }

.modal .input-group input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  padding: 10px 0;
  color: var(--text);
  font-size: 13px;
}

.modal .input-group input::placeholder { color: var(--text3); }

.modal-btns {
  display: flex;
  gap: 10px;
  justify-content: flex-end;
  padding-top: 4px;
}

.btn-save {
  background: var(--accent);
  color: #0d0f14;
  border: none;
  padding: 10px 22px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 700;
  font-family: 'Syne', sans-serif;
  cursor: pointer;
  transition: opacity 0.15s;
}

.btn-save:hover { opacity: 0.85; }

.btn-cancel {
  background: none;
  border: 1px solid var(--border);
  color: var(--text2);
  padding: 10px 18px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  cursor: pointer;
  transition: all 0.15s;
}

.btn-cancel:hover { border-color: var(--red); color: var(--red); }

/* ════════════════════════════════════════════
   SCROLLBAR
   ════════════════════════════════════════════ */
::-webkit-scrollbar       { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

/* ════════════════════════════════════════════
   PRINT
   ════════════════════════════════════════════ */
@media print {
  .sidebar,
  .product-form,
  .search-box,
  .action-btns { display: none !important; }

  .admin-container { grid-template-columns: 1fr; }
  .product-table   { font-size: 11px; }
}
</style>

</head>
<body>

<div class="admin-container">

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>SmartPOS</h2>
        <ul>
            <li><a href="admin.html">Dashboard</a></li>
            <li class="active"><a href="products.html">Products</a></li>
        </ul>
    </div>

    <!-- Main Content -->
    <div class="main">

        

        <h2 class="page-title">
    <i class="fas fa-box-open"></i> Product Management
</h2>

<div class="product-form">

    <div class="input-group">
        <i class="fas fa-tag"></i>
        <input type="text" id="productName" placeholder="Product Name">
    </div>

    <!-- UNIT SELLING PRICE -->
    <div class="input-group">
        <i class="fas fa-money-bill-wave"></i>
        <input type="number" id="unitPrice" placeholder="Unit Selling Price">
    </div>

    <!-- BULK SELLING PRICE -->
    <div class="input-group">
        <i class="fas fa-box"></i>
        <input type="number" id="bulkPrice" placeholder="Bulk Price (Carton/Box)">
    </div>

    <!-- UNITS PER BULK -->
    <div class="input-group">
        <i class="fas fa-layer-group"></i>
        <input type="number" id="unitsPerBulk" placeholder="Units Per Bulk (e.g. 12)">
    </div>

    <!-- COST PRICE -->
    <div class="input-group">
        <i class="fas fa-coins"></i>
        <input type="number" id="productCost" placeholder="Cost Price (Per Unit)">
        <div class="input-group">
    <i class="fas fa-boxes"></i>
    <input type="number" id="bulkCost" placeholder="Bulk Cost Price (Carton/Box)">
</div>
    </div>

    <!-- STOCK -->
    <div class="input-group">
        <i class="fas fa-warehouse"></i>
        <input type="number" id="productStock" placeholder="Stock (Total Units)">
    </div>
    
    <div class="input-group">
<input type="text" id="productEmoji" placeholder="Emoji (e.g 🥤)">
    </div>

    <button class="add-btn" onclick="addProduct()">
        <i class="fas fa-plus-circle"></i> Add Product
    </button>

</div>

<div class="search-box">
    <i class="fas fa-search"></i>
    <input type="text" id="searchProduct" placeholder="Search product...">
</div>

        <table class="product-table">
            <thead>
<tr>
    <th>Name</th>
    <th>Unit Price</th>
    <th>Bulk Price</th>
    <th>Units/Bulk</th>
    <th>Unit Cost</th>
    <th>Bulk Cost</th>
    <th>Stock (Units)</th>
    <th>Unit Profit</th>
    
    <th>Barcode</th>
    <th>Actions</th>
</tr>
</thead>
            
            <tbody id="productTableBody"></tbody>
        </table>

    </div>

</div>
     

<script src="products.js"></script>
</body>
</html>
